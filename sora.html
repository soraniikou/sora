<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ただ、空を見ている</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
    cursor: none;
  }

  /* 空の写真レイヤー */
  .sky {
    position: fixed;
    inset: 0;
    background-size: 200% 200%;
    background-position: 50% 50%;
    opacity: 0;
    transition: opacity 4s ease;
    filter: brightness(0.7) saturate(0.8);
    animation: skyMove 30s linear infinite alternate;
  }

  @keyframes skyMove {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  .sky.visible { opacity: 1; }

  /* 上下グラデオーバーレイ */
  .overlay {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.4) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.6) 100%
      );
    z-index: 10;
    pointer-events: none;
  }

  /* 呼吸の光 */
  #breath-orb {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border: 1px solid rgba(255,255,255,0.2);
    z-index: 20;
    animation: none;
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.4;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }

  @keyframes breathe {
    0%, 100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 0.4;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }
    50% {
      transform: translate(-50%, -50%) scale(1.6);
      opacity: 0.8;
      box-shadow: 0 0 60px rgba(255,255,255,0.2);
    }
  }

  /* 言葉 */
  #word {
    position: fixed;
    bottom: 15vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease;
    mix-blend-mode: difference;
    width: 90vw;
    max-width: 640px;
  }

  #word.visible { opacity: 1; }

  .word-main {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.5em;
    color: #ffffff;
    line-height: 2;
  }

  .word-sub {
    font-size: clamp(0.72rem, 2.4vw, 0.9rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.55);
    margin-top: 0.8rem;
  }

  /* 流れ星 Canvas */
  #star-canvas {
    position: fixed;
    inset: 0;
    z-index: 16;
    pointer-events: none;
  }

  /* オリオン座 Canvas */
  #orion-canvas {
    position: fixed;
    inset: 0;
    z-index: 17;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease;
  }
  #orion-canvas.visible { opacity: 1; }

  /* タップヒント */
  #hint {
    position: fixed;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.75);
    z-index: 30;
    white-space: nowrap;
    animation: hintFade 4s ease-in-out infinite;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* 画面タップの波紋 */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    transform: translate(-50%, -50%) scale(0);
    animation: rippleOut 13.5s ease-out forwards;
    pointer-events: none;
    z-index: 50;
  }

  @keyframes rippleOut {
    to {
      transform: translate(-50%, -50%) scale(8);
      opacity: 0;
    }
  }

  /* フェードアウト遷移 */
  #fade {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #fade.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<div class="sky" id="sky1"></div>
<div class="sky" id="sky2"></div>
<div class="overlay"></div>
<div id="breath-orb"></div>
<canvas id="star-canvas"></canvas>
<canvas id="orion-canvas"></canvas>

<div id="word">
  <div class="word-main" id="word-text">ただ、ここにいていい</div>
  <div class="word-sub" id="word-sub">息を吸って　ゆっくり吐く</div>
</div>

<div id="hint">画面にそっと触れて</div>
<div id="fade"></div>
<audio id="scene-audio" src="3%E6%9C%881%E6%97%A5%EF%BC%8813-42%EF%BC%89.m4a" loop preload="auto"></audio>

<script>
// 空の写真 — GitHubにpushした後は実際のパスに変える
// 今は美しいグラデーションで代替
const skies = [
  { gradient: 'linear-gradient(to bottom, #2c3e50 0%, #4a6fa5 40%, #c9a96e 70%, #8b5e3c 100%)', words: ['ただ、ここにいていい', '何も決めなくていい'], subs: ['あなたの名前を呼んで', 'この瞬間だけでいい'] },
  { gradient: 'linear-gradient(to bottom, #1a1a2e 0%, #4a5568 30%, #718096 60%, #a0aec0 85%, #e8d5b7 100%)', words: ['失ったものは<br>本当にあった', 'だから今　痛い'], subs: ['それでいい', '空に思いを投げる'] },
  { gradient: 'linear-gradient(to bottom, #0d1117 0%, #1e2d40 40%, #2d4a6e 70%, #4a7fa5 100%)', words: ['痛みは<br>そのままで', 'それだけで<br>十分'], subs: ['ゆっくり　ゆっくり', '焦らなくていい'] },
  { gradient: 'linear-gradient(to bottom, #2d1b33 0%, #4a3560 40%, #7a6090 70%, #b8a8c8 90%, #e8dff0 100%)', words: ['人は変わる', 'それでも空は続く'], subs: ['あなたも続いていく', ''] },
  { gradient: 'radial-gradient(ellipse at 60% 30%, #1a1428 0%, #0a0812 40%, #000008 100%), linear-gradient(to bottom, #08060f 0%, #100d1e 25%, #0d0a18 55%, #1a1030 80%, #0a0814 100%)', fixedBg: true, words: ['超えられない夜を<br>抱きしめる'], subs: ['それでいい'] },
  { gradient: 'radial-gradient(ellipse at 40% 25%, #1c1230 0%, #08050f 45%, #000008 100%), linear-gradient(to bottom, #060410 0%, #0e0b1c 30%, #0a0816 60%, #160e28 85%, #080510 100%)', fixedBg: true, words: ['瞼を閉じる'], subs: ['泣いてもいいよ'] },
  { gradient: 'radial-gradient(ellipse at 55% 35%, #18102a 0%, #090610 45%, #000008 100%), linear-gradient(to bottom, #07050f 0%, #0f0c1c 30%, #0b0918 60%, #18102a 85%, #09060f 100%)', fixedBg: true, words: ['どうかお願い'], subs: ['私は私で良いと思えるように'] },
  { gradient: 'radial-gradient(ellipse at 45% 28%, #150e24 0%, #080510 45%, #000006 100%), linear-gradient(to bottom, #060410 0%, #0d0b1a 30%, #090716 60%, #140c22 85%, #070410 100%)', fixedBg: true, words: ['神様　おねがい'], subs: ['声を聞かせて'] },
];

// 実際の写真ファイルがある場合は以下のように上書き
// skies[0].image = 'sky1.jpg';
// skies[1].image = 'sky2.jpg';

let current = 0;
let isTransitioning = false;

const sky1El = document.getElementById('sky1');
const sky2El = document.getElementById('sky2');
const wordEl = document.getElementById('word');
const wordText = document.getElementById('word-text');
const wordSub = document.getElementById('word-sub');
const fadeEl = document.getElementById('fade');

function applySky(el, idx) {
  const s = skies[idx];
  if (s.image) {
    el.style.backgroundImage = `url(${s.image})`;
    el.style.backgroundSize = 'cover';
  } else {
    el.style.backgroundImage = s.gradient;
    el.style.backgroundSize = s.fixedBg ? 'cover' : '200% 200%';
  }
}

const sceneAudio = document.getElementById('scene-audio');
// 「瞼を閉じる」シーンのインデックス
const AUDIO_SCENE_IDX = skies.findIndex(s => s.words.includes('瞼を閉じる'));

function showScene(idx) {
  const s = skies[idx];
  const active = idx % 2 === 0 ? sky1El : sky2El;
  const inactive = idx % 2 === 0 ? sky2El : sky1El;

  applySky(active, idx);

  // 言葉をランダム選択
  const wi = Math.floor(Math.random() * s.words.length);
  wordText.innerHTML = s.words[wi];
  wordSub.textContent = s.subs[wi] || '';

  // 音声：「瞼を閉じる」シーンのみ再生、それ以外はフェードアウト停止
  if (idx === AUDIO_SCENE_IDX) {
    sceneAudio.currentTime = 0;
    sceneAudio.volume = 0;
    const playPromise = sceneAudio.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // 自動再生ブロック時は次のユーザー操作で再生
        const resumeAudio = () => {
          sceneAudio.play().catch(() => {});
          document.removeEventListener('pointerdown', resumeAudio);
        };
        document.addEventListener('pointerdown', resumeAudio, { once: true });
      });
    }
    // ボリュームを2秒かけてフェードイン
    let vol = 0;
    const fadeIn = setInterval(() => {
      vol = Math.min(vol + 0.025, 1);
      sceneAudio.volume = vol;
      if (vol >= 1) clearInterval(fadeIn);
    }, 50);
  } else {
    if (!sceneAudio.paused) {
      let vol = sceneAudio.volume;
      const fadeOut = setInterval(() => {
        vol = Math.max(vol - 0.05, 0);
        sceneAudio.volume = vol;
        if (vol <= 0) { clearInterval(fadeOut); sceneAudio.pause(); sceneAudio.currentTime = 0; }
      }, 50);
    }
  }

  // オリオン座の表示切替
  if (isOrionScene(idx)) {
    orionCanvas.classList.add('visible');
    startOrionAnim();
  } else {
    orionCanvas.classList.remove('visible');
    setTimeout(stopOrionAnim, 3000); // フェードアウト後に停止
  }

  // フェードイン
  setTimeout(() => {
    inactive.classList.remove('visible');
    active.classList.add('visible');
    setTimeout(() => {
      wordEl.classList.add('visible');
    }, 1500);
  }, 100);
}

function nextScene(x, y) {
  if (isTransitioning) return;
  isTransitioning = true;

  // 波紋（サイズランダム・速度3倍遅・色ランダム）
  const rippleSize = 15 + Math.random() * 45;
  const rippleColor = Math.random() < 0.3
    ? `rgba(${60 + Math.floor(Math.random()*40)}, ${10 + Math.floor(Math.random()*20)}, ${180 + Math.floor(Math.random()*60)}, 0.85)`
    : 'rgba(255,255,255,0.3)';
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.width  = rippleSize + 'px';
  r.style.height = rippleSize + 'px';
  r.style.borderColor = rippleColor;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 13500);

  // 言葉をフェードアウト
  wordEl.classList.remove('visible');

  setTimeout(() => {
    current = (current + 1) % skies.length;
    showScene(current);
    isTransitioning = false;
  }, 1200);
}

// ── 長押し：呼吸オーブのペースをユーザーに合わせる ──
const orbEl = document.getElementById('breath-orb');
let pressStart = null;
let pressTimer = null;
const DEFAULT_BREATHE_MS = 6000;

function startLongPress() {
  pressStart = Date.now();
  // 長押し中はアニメーションを一時停止して視覚的フィードバック
  orbEl.style.animationPlayState = 'paused';
  orbEl.style.transition = 'transform 0.4s ease, opacity 0.4s ease, box-shadow 0.4s ease';
  orbEl.style.transform = 'translate(-50%, -50%) scale(1.8)';
  orbEl.style.opacity = '0.9';
  orbEl.style.boxShadow = '0 0 80px rgba(255,255,255,0.3)';
}

function endLongPress() {
  if (!pressStart) return;
  const held = Date.now() - pressStart;
  pressStart = null;

  // 長押し時間（最小2秒〜最大12秒）を1呼吸のペースとして採用
  const newDuration = Math.min(Math.max(held * 2, 2000), 12000);
  orbEl.style.transition = '';
  orbEl.style.transform = '';
  orbEl.style.opacity = '';
  orbEl.style.boxShadow = '';
  orbEl.style.animationDuration = newDuration + 'ms';
  orbEl.style.animationPlayState = 'running';
}

// マウス長押し（クリックと区別するため pointerdown/pointerup を使用）
let didLongPress = false;
document.addEventListener('pointerdown', () => {
  didLongPress = false;
  pressTimer = setTimeout(() => {
    didLongPress = true;
    startLongPress();
  }, 400);
});
document.addEventListener('pointerup', e => {
  clearTimeout(pressTimer);
  if (didLongPress) {
    endLongPress();
  } else {
    nextScene(e.clientX, e.clientY);
  }
});
document.addEventListener('pointercancel', () => {
  clearTimeout(pressTimer);
  endLongPress();
});

// ── 流れ星：Canvas描画（ランダム方向・サイズ2倍・尾3倍長） ──
const starCanvas = document.getElementById('star-canvas');
const starCtx = starCanvas.getContext('2d');

function resizeStarCanvas() {
  starCanvas.width  = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStarCanvas();
window.addEventListener('resize', resizeStarCanvas);

// 同時に複数の流れ星を管理
const shootingStars = [];

function spawnShootingStar() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  // 出発点：画面4辺のどこかからランダムに
  const edge = Math.floor(Math.random() * 4); // 0=上 1=右 2=下 3=左
  let sx, sy;
  if (edge === 0) { sx = Math.random() * W; sy = -10; }
  else if (edge === 1) { sx = W + 10; sy = Math.random() * H; }
  else if (edge === 2) { sx = Math.random() * W; sy = H + 10; }
  else               { sx = -10; sy = Math.random() * H; }

  // 進行方向：画面内側へ向かうランダム角度（±60度のぶれ）
  const towardAngle = Math.atan2(H / 2 - sy, W / 2 - sx);
  const spread = (Math.random() - 0.5) * (Math.PI * 2 / 3); // ±60°
  const angle = towardAngle + spread;

  // 速度（px/frame）：4〜7px
  const speed = 4 + Math.random() * 3;
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;

  // 尾の履歴（3倍長くするために180点分貯める）
  const TAIL_LEN = 180;

  // 色：白(60%) / 金色(20%) / 深い紫(20%) のいずれか
  const colorRoll = Math.random();
  let starColor;
  if (colorRoll < 0.6)       starColor = { r: 255, g: 255, b: 255 }; // 白
  else if (colorRoll < 0.8)  starColor = { r: 255, g: 210, b:  80 }; // 金色
  else                       starColor = { r: 160, g:  80, b: 220 }; // 深い紫

  shootingStars.push({
    x: sx, y: sy,
    vx, vy,
    // 核のサイズ：4px × 0.7 ≒ 2.8px
    radius: 1.96,
    tail: [],
    tailLen: TAIL_LEN,
    // 生存フレーム：画面の対角を超えるくらいまで
    life: 0,
    maxLife: Math.round(Math.sqrt(W * W + H * H) / speed) + TAIL_LEN + 20,
    opacity: 0,
    color: starColor,
  });
}

function drawShootingStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);

  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.life++;

    // フェードイン（最初の15frame）
    if (s.life < 15) {
      s.opacity = s.life / 15;
    }
    // 核が画面外に出てからは尾だけ残してフェードアウト
    const outOfBounds =
      s.x < -s.tailLen * Math.abs(s.vx) ||
      s.x > starCanvas.width  + s.tailLen * Math.abs(s.vx) ||
      s.y < -s.tailLen * Math.abs(s.vy) ||
      s.y > starCanvas.height + s.tailLen * Math.abs(s.vy);

    // 尾の履歴を追加（まだ画面外に出ていない間）
    if (!outOfBounds) {
      s.tail.unshift({ x: s.x, y: s.y });
      if (s.tail.length > s.tailLen) s.tail.pop();
      s.x += s.vx;
      s.y += s.vy;
    } else {
      // 核が消えたら尾を短くしながらフェードアウト
      if (s.tail.length > 0) s.tail.pop();
      s.opacity = Math.max(0, s.opacity - 0.02);
    }

    if (s.life > s.maxLife || (outOfBounds && s.tail.length === 0)) {
      shootingStars.splice(i, 1);
      continue;
    }

    // ── 尾を描画（グラデーション線） ──
    if (s.tail.length >= 2) {
      for (let j = 0; j < s.tail.length - 1; j++) {
        const prog = j / s.tail.length; // 0=先頭(明)→1=末尾(暗)
        const alpha = s.opacity * (1 - prog) * 0.85;
        const width  = (1 - prog) * 2.5; // 先端ほど太く

        starCtx.beginPath();
        starCtx.moveTo(s.tail[j].x, s.tail[j].y);
        starCtx.lineTo(s.tail[j + 1].x, s.tail[j + 1].y);
        const c = s.color;
        starCtx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${alpha.toFixed(3)})`;
        starCtx.lineWidth = width;
        starCtx.lineCap = 'round';
        starCtx.stroke();
      }
    }

    // ── 核（光る点）を描画 ──
    if (!outOfBounds) {
      const grad = starCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 3);
      const c = s.color;
      grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${s.opacity})`);
      grad.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},${(s.opacity * 0.6).toFixed(3)})`);
      grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.radius * 3, 0, Math.PI * 2);
      starCtx.fillStyle = grad;
      starCtx.fill();
    }
  }

  requestAnimationFrame(drawShootingStars);
}
drawShootingStars();

// 15秒ごとに流れ星を1つ生成（最初だけ5〜10秒後）
function scheduleNextStar() {
  spawnShootingStar();
  setTimeout(scheduleNextStar, 20000);
}
setTimeout(scheduleNextStar, 5000 + Math.random() * 5000);

// ── オリオン座 ──
const orionCanvas = document.getElementById('orion-canvas');
const orionCtx = orionCanvas.getContext('2d');

function resizeOrionCanvas() {
  orionCanvas.width  = window.innerWidth;
  orionCanvas.height = window.innerHeight;
  drawOrion();
}
window.addEventListener('resize', resizeOrionCanvas);

// オリオン座の星（正規化座標 0〜1）と接続線
// 実際のオリオン座の配置に準拠
const ORION_STARS = [
  // name, nx, ny, magnitude(明るさ1〜4)
  { n:'ベテルギウス',  x:0.36, y:0.32, m:1 },  // 左肩（赤色超巨星）
  { n:'リゲル',        x:0.68, y:0.72, m:1 },  // 右足（青白色）
  { n:'ベラトリクス',  x:0.62, y:0.30, m:2 },  // 右肩
  { n:'サイフ',        x:0.38, y:0.74, m:2 },  // 左足
  { n:'ミンタカ',      x:0.44, y:0.50, m:3 },  // 三つ星 右
  { n:'アルニラム',    x:0.50, y:0.52, m:2 },  // 三つ星 中
  { n:'アルニタク',    x:0.56, y:0.54, m:2 },  // 三つ星 左
  { n:'メイッサ',      x:0.50, y:0.18, m:3 },  // 頭
  { n:'肩左上',        x:0.30, y:0.25, m:4 },  // 左腕上
  { n:'肩右上',        x:0.70, y:0.23, m:4 },  // 右腕上
];

const ORION_LINES = [
  [0,4],[0,3],[1,6],[1,2],[2,4],[3,5],[4,5],[5,6], // 胴体・足
  [0,8],[2,9],[7,0],[7,2],                          // 頭・腕
];

// 流星群の軌跡（オリオン座から放射）
const orionMeteors = [];
let orionMeteorTimer = 0;

function spawnOrionMeteor() {
  const W = orionCanvas.width;
  const H = orionCanvas.height;
  // 放射点：オリオン座の中心付近（三つ星あたり）
  const radX = W * 0.50;
  const radY = H * 0.48;
  // 放射方向：放射点から外側へランダムに広がる
  const angle = Math.random() * Math.PI * 2;
  const dist  = 80 + Math.random() * 120;
  const speed = 2 + Math.random() * 1.67;
  const len   = 100 + Math.random() * 160;

  orionMeteors.push({
    x: radX + Math.cos(angle) * dist,
    y: radY + Math.sin(angle) * dist,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len,
    life: 0,
    maxLife: Math.round(len / speed) + 30,
    tail: [],
    opacity: 0,
    color: Math.random() < 0.5
      ? { r:255, g:255, b:255 }
      : Math.random() < 0.5
        ? { r:180, g:210, b:255 }  // 青白
        : { r:255, g:220, b:120 }, // 淡金
  });
}

function drawOrion() {
  const W = orionCanvas.width;
  const H = orionCanvas.height;
  orionCtx.clearRect(0, 0, W, H);

  // ── 背景の細かい星をランダムで描画（シードを固定するためindexベース）──
  // 毎フレームではなく初期化時のみ描く静止星
  if (!orionCanvas._staticStars) {
    orionCanvas._staticStars = Array.from({length: 180}, (_, i) => ({
      x: ((i * 137.508) % 1) * W,
      y: ((i * 97.531)  % 1) * H,
      r: 0.3 + (i % 5) * 0.18,
      a: 0.2 + (i % 7) * 0.08,
    }));
  }
  orionCanvas._staticStars.forEach(s => {
    orionCtx.beginPath();
    orionCtx.arc(s.x * (W / (orionCanvas._w || W)), s.y * (H / (orionCanvas._h || H)), s.r, 0, Math.PI * 2);
    orionCtx.fillStyle = `rgba(255,255,255,${s.a})`;
    orionCtx.fill();
  });
  orionCanvas._w = W; orionCanvas._h = H;

  // ── オリオン座の接続線 ──
  ORION_LINES.forEach(([a, b]) => {
    const sa = ORION_STARS[a], sb = ORION_STARS[b];
    orionCtx.beginPath();
    orionCtx.moveTo(sa.x * W, sa.y * H);
    orionCtx.lineTo(sb.x * W, sb.y * H);
    orionCtx.strokeStyle = 'rgba(180,200,255,0.18)';
    orionCtx.lineWidth = 0.8;
    orionCtx.stroke();
  });

  // ── オリオン座の星 ──
  ORION_STARS.forEach(s => {
    const px = s.x * W, py = s.y * H;
    const baseR = [5, 4, 3, 2][s.m - 1];
    // グロー
    const g = orionCtx.createRadialGradient(px, py, 0, px, py, baseR * 4);
    const isRed = s.n === 'ベテルギウス';
    const sc = isRed ? '255,160,80' : s.m <= 2 ? '200,220,255' : '255,255,255';
    g.addColorStop(0,   `rgba(${sc},${s.m === 1 ? 1 : 0.85})`);
    g.addColorStop(0.3, `rgba(${sc},0.4)`);
    g.addColorStop(1,   `rgba(${sc},0)`);
    orionCtx.beginPath();
    orionCtx.arc(px, py, baseR * 4, 0, Math.PI * 2);
    orionCtx.fillStyle = g;
    orionCtx.fill();
    // 核
    orionCtx.beginPath();
    orionCtx.arc(px, py, baseR, 0, Math.PI * 2);
    orionCtx.fillStyle = `rgba(${sc},1)`;
    orionCtx.fill();
  });

  // ── オリオン座流星群の軌跡 ──
  orionMeteorTimer++;
  if (orionMeteorTimer % 40 === 0) spawnOrionMeteor();

  for (let i = orionMeteors.length - 1; i >= 0; i--) {
    const m = orionMeteors[i];
    m.life++;
    if (m.life < 10) m.opacity = m.life / 10;

    const outOfBounds =
      m.x < -200 || m.x > W + 200 || m.y < -200 || m.y > H + 200;

    if (!outOfBounds) {
      m.tail.unshift({ x: m.x, y: m.y });
      if (m.tail.length > 60) m.tail.pop();
      m.x += m.vx;
      m.y += m.vy;
    } else {
      if (m.tail.length > 0) m.tail.pop();
      m.opacity = Math.max(0, m.opacity - 0.04);
    }

    if (m.life > m.maxLife || (outOfBounds && m.tail.length === 0)) {
      orionMeteors.splice(i, 1);
      continue;
    }

    if (m.tail.length >= 2) {
      for (let j = 0; j < m.tail.length - 1; j++) {
        const prog  = j / m.tail.length;
        const alpha = m.opacity * (1 - prog) * 0.9;
        const w     = (1 - prog) * 2;
        const c = m.color;
        orionCtx.beginPath();
        orionCtx.moveTo(m.tail[j].x, m.tail[j].y);
        orionCtx.lineTo(m.tail[j+1].x, m.tail[j+1].y);
        orionCtx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${alpha.toFixed(3)})`;
        orionCtx.lineWidth = w;
        orionCtx.lineCap = 'round';
        orionCtx.stroke();
      }
    }
  }
}

// アニメーションループ（オリオン表示中のみ）
let orionAnimId = null;
function startOrionAnim() {
  if (orionAnimId) return;
  function loop() {
    drawOrion();
    orionAnimId = requestAnimationFrame(loop);
  }
  orionAnimId = requestAnimationFrame(loop);
}
function stopOrionAnim() {
  if (orionAnimId) { cancelAnimationFrame(orionAnimId); orionAnimId = null; }
  orionCtx.clearRect(0, 0, orionCanvas.width, orionCanvas.height);
}

// オリオン表示が必要なシーンインデックスを特定
const ORION_SCENE_WORDS = ['超えられない夜を<br>抱きしめる', '瞼を閉じる', 'どうかお願い', '神様　おねがい'];
function isOrionScene(idx) {
  return skies[idx].words.some(w => ORION_SCENE_WORDS.includes(w));
}

resizeOrionCanvas();

// 初期表示
showScene(0);

// 60秒で自動的に次へ
setInterval(() => {
  if (!isTransitioning) nextScene(window.innerWidth/2, window.innerHeight/2);
}, 60000);
</script>
